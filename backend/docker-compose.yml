services:
  backend:
    build: .
    container_name: roomify-backend
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://root:roomify_dev_password@mongodb:27017/roomify?authSource=admin
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:8
    container_name: roomify-mongodb-final
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: roomify_dev_password
      MONGO_INITDB_DATABASE: roomify
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: roomify-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
